<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusQuest</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300;400&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --chalk:      #f5f0e8;
        --sand:       #e8d5b0;
        --cream:      #f0ede8;
        --gold:       #c8a96e;
        --gold-soft:  rgba(200, 169, 110, 0.35);
        --gold-glow:  rgba(200, 169, 110, 0.28);
        --warm-ink:   #2c1f10;
        --warm-muted: rgba(44, 31, 16, 0.52);
        --glass-bg:   rgba(245, 240, 232, 0.26);
        --glass-edge: rgba(200, 169, 110, 0.32);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Josefin Sans", sans-serif;
        height: 100vh;
        overflow: hidden;
        background: url("Hintegrundbild.jpg") center / cover no-repeat fixed;
      }

      /* ── SCREEN ── */
      #startScreen {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: rise 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      /* ── LAYOUT COLUMN ── */
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 44px;
        width: 100%;
        max-width: 460px;
        padding: 0 28px;
      }

      /* ── ORNAMENT ── */
      .ornament {
        font-size: 0.5rem;
        letter-spacing: 1.4em;
        text-indent: 1.4em;
        color: var(--gold);
        opacity: 0.6;
      }

      /* ── TITLE BLOCK ── */
      .title-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        text-align: center;
      }

      .main-title {
        font-family: "Press Start 2P", monospace;
        font-size: 2.15rem;
        font-weight: 400;
        letter-spacing: 0.12em;
        text-indent: 0.12em;
        color: var(--chalk);
        line-height: 1.3;
        text-shadow:
          0 2px 20px rgba(0, 0, 0, 0.26),
          0 0 60px rgba(200, 169, 110, 0.18);
      }

      .title-rule {
        width: 52px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        opacity: 0.8;
      }

      .subtitle {
        font-size: 0.54rem;
        font-weight: 300;
        letter-spacing: 0.5em;
        text-indent: 0.5em;
        color: var(--gold);
        text-transform: uppercase;
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.14);
      }

      /* ── GLASS CARD ── */
      .card {
        width: 100%;
        background: var(--glass-bg);
        border: 1px solid var(--glass-edge);
        border-radius: 22px;
        padding: 44px 52px;
        backdrop-filter: blur(26px);
        -webkit-backdrop-filter: blur(26px);
        box-shadow:
          0 12px 48px rgba(180, 140, 80, 0.12),
          inset 0 1px 0 rgba(245, 240, 232, 0.55),
          inset 0 -1px 0 rgba(200, 169, 110, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      .card-label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.52rem;
        font-weight: 300;
        letter-spacing: 0.44em;
        text-indent: 0.44em;
        color: var(--warm-muted);
        text-transform: uppercase;
      }

      .card-label::before {
        content: "";
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0.65;
        flex-shrink: 0;
        text-indent: 0;
      }

      /* ── BUTTON ── */
      .btn {
        background: rgba(245, 240, 232, 0.38);
        border: 1px solid rgba(200, 169, 110, 0.42);
        color: var(--warm-ink);
        padding: 15px 56px;
        font-family: "Josefin Sans", sans-serif;
        font-size: 0.66rem;
        font-weight: 300;
        letter-spacing: 0.4em;
        text-indent: 0.4em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 50px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        transition:
          border-color 0.35s ease,
          box-shadow 0.35s ease,
          background 0.35s ease;
        position: relative;
        overflow: hidden;
      }

      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(245, 240, 232, 0.22);
        opacity: 0;
        transition: opacity 0.35s ease;
        border-radius: inherit;
      }

      .btn:hover {
        border-color: var(--gold);
        background: rgba(245, 240, 232, 0.48);
        box-shadow:
          0 0 28px rgba(200, 169, 110, 0.3),
          0 0 70px rgba(200, 169, 110, 0.1);
      }

      .btn:hover::after {
        opacity: 1;
      }

      .btn:active {
        transform: scale(0.98);
      }

      /* ── FOOTER ── */
      .screen-footer {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 0.44rem;
        font-weight: 300;
        letter-spacing: 0.4em;
        text-indent: 0.4em;
        color: rgba(245, 240, 232, 0.3);
        text-transform: uppercase;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
      }

      .screen-footer .sep {
        opacity: 0.45;
        letter-spacing: 0;
        text-indent: 0;
      }

      /* ── ANIMATION ── */
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="startScreen">
      <div class="wrap">

        <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>

        <div class="title-block">
          <h1 class="main-title">FOCUSQUEST</h1>
          <div class="title-rule"></div>
          <p class="subtitle">Deine Fokus-Welt wartet</p>
        </div>

        <div class="card">
          <p class="card-label">Bereit für deine Session?</p>
          <button class="btn" onclick="startFocus()">Focus starten</button>
        </div>

        <div class="screen-footer">
          <span>FocusQuest</span>
          <span class="sep">·</span>
          <span>V 0.1</span>
        </div>

      </div>
    </div>

    <script>
      function startFocus() {
        console.log("startFocus() — screen wird folgen");
      }
    </script>
  </body>
</html>
